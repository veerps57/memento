name: Deploy landing to GitHub Pages

# Build + publish the marketing landing (`packages/landing`) to
# GitHub Pages whenever it changes on main, plus a manual
# `workflow_dispatch` trigger for ad-hoc reruns. The page itself
# is a Vite-built static SPA; the workflow uses GitHub's modern
# Pages-via-Actions flow (no `gh-pages` branch).
#
# One-time setup: in repo Settings → Pages, set Source to
# "GitHub Actions". Without that flip, this workflow's deploy
# step has nothing to publish to.

on:
  push:
    branches: [main]
    paths:
      - 'packages/landing/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows one in-flight deployment at a time. Cancelling
# in-progress deploys would leave the site half-published, so
# we queue instead — `cancel-in-progress: false`.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build landing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing
        env:
          # Custom domain (runmemento.com) serves at the apex,
          # so Vite's `base` is `/`. The CNAME file in
          # packages/landing/public/ tells GitHub Pages which
          # host to serve.
          VITE_BASE_PATH: /
        run: pnpm -F @psraghuveer/memento-landing build

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: packages/landing/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
