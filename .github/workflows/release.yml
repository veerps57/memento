name: Release

on:
  # Auto-run on every push to main: changesets/action either
  # opens/updates a "Version Packages" PR (when pending changeset
  # files exist) or, when the previous Version Packages PR was
  # just merged, runs `pnpm release` to publish via OIDC.
  # workflow_dispatch is retained for ad-hoc reruns (e.g. to
  # retry after a transient publish failure).
  push:
    branches: [main]
  workflow_dispatch:

# Concurrency limits to one release run at a time, queued by ref,
# so two quick merges can't race the version PR.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance

# Disable lefthook on the runner. The `prepare` script in
# package.json installs git hooks via `lefthook install`, which
# means changesets/action's `git commit` + `git push` would
# trigger our pre-commit and pre-push hooks. Two of those hooks
# fail on CI: the `branch-name` check rejects the action's
# `changeset-release/main` branch (it doesn't match the
# `<type>/<slug>` regex), and `pnpm test` fails because the
# better-sqlite3 prebuilt isn't installed in this minimal job.
# CI is itself the authoritative test gate — re-running hooks
# on the runner is redundant and now actively harmful.
env:
  LEFTHOOK: "0"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Changesets needs full history to determine which packages
          # have pending changes.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
          # Intentionally NOT setting `registry-url`. With it set,
          # setup-node writes `.npmrc` with
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`,
          # and because we have no `NPM_TOKEN` secret (we use OIDC
          # trusted publishing), it substitutes a literal
          # `XXXXX-XXXXX-XXXXX-XXXXX` placeholder. npm publish then
          # uses that bogus token instead of the OIDC flow, and the
          # registry replies 404 on the scoped package PUT.
          # Leaving `.npmrc` untouched lets the npm CLI take the
          # trusted-publishing path on its own.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upgrade npm CLI for OIDC trusted publishing
        # `changeset publish` shells out to `npm publish` per
        # package. OIDC trusted publishing (no NPM_TOKEN, exchange
        # the GitHub-issued ID token for a short-lived publish
        # token) was added in npm 11.5.1. The npm bundled with
        # Node 20.x is 10.x, which doesn't know about OIDC and
        # fails with `ENEEDAUTH` because no `_authToken` is set
        # in `.npmrc` either. Pin a known-good npm here.
        run: npm install -g npm@11.5.1

      - name: Build packages
        run: pnpm build

      - name: Create release PR or publish
        id: changesets
        # The action does both jobs:
        #  - if there are pending changesets, opens/updates a
        #    "Version Packages" PR that bumps versions and
        #    consumes the changesets.
        #  - if the previous "Version Packages" PR was just merged,
        #    runs `pnpm release` (build + changeset publish).
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: publishing uses OIDC trusted publishing
          # (configured per-package on npmjs.com). The job needs
          # `permissions.id-token: write` (set above) and a
          # recent pnpm/npm CLI to mint and exchange the OIDC
          # token automatically. NPM_CONFIG_PROVENANCE attaches
          # SLSA provenance attestations to each published tarball.
          NPM_CONFIG_PROVENANCE: "true"

      - name: Tag umbrella release
        # changesets/action publishes per-package git tags
        # (e.g. @psraghuveer/memento@0.1.0). For humans we also
        # want a single `vX.Y.Z` tag on the release commit, keyed
        # off the CLI package version (what `memento --version`
        # prints). Skipped when nothing was published. Idempotent:
        # silently skips if the tag already exists.
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping."
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
