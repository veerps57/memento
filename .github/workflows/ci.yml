name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref. The latest push wins.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch name
    # Only meaningful on PRs (push events on main are always allowed).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if ! printf '%s' "$BRANCH" | grep -Eq '^(feat|fix|chore|docs|refactor|test|perf|ci|build|revert|hotfix)/[a-z0-9][a-z0-9._-]*$'; then
            echo "::error::Branch '$BRANCH' does not match required pattern."
            echo "Allowed: <type>/<slug>  where type ∈ feat|fix|chore|docs|refactor|test|perf|ci|build|revert|hotfix"
            echo "Slug: lowercase alphanumerics plus . _ -  (must start with [a-z0-9])"
            exit 1
          fi
          echo "Branch '$BRANCH' OK."

  validate:
    # Consolidates every single-OS, single-Node check from `pnpm verify`
    # (everything except the multi-platform test matrix) into one job so
    # the install + build runs once. Previously these lived as four
    # parallel jobs (lint, typecheck, build, docs-lint) each paying
    # install overhead independently; docs:reflow:check / docs:check /
    # format:packs:check / server-json:check / docs:links were not run
    # in CI at all and could land via `git commit --no-verify`. CI is
    # now a structural mirror of `pnpm verify`.
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          # setup-node caches the pnpm content-addressed store. The
          # additional workspace-`node_modules` cache step below
          # complements it by short-circuiting symlink-tree rebuilds.
          cache: pnpm

      - name: Cache workspace node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          # Restoring node_modules across jobs is the speed win on top
          # of setup-node's pnpm-store cache. Keyed strictly on the
          # lockfile hash so a dependency bump invalidates cleanly.
          # `lefthook install` writes into `.git/hooks` and never
          # touches `node_modules`, so it's safe to skip pnpm install
          # entirely on cache hits.
          key: nm-${{ runner.os }}-validate-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck (tsc)
        run: pnpm typecheck

      # Build is required before docs:check (which compares generated
      # reference docs against the live registry) and before
      # `pnpm exec vitest` in the test matrix (tests resolve workspace
      # packages via their published exports, which point at `dist/`).
      - name: Build all packages
        run: pnpm build

      - name: Lint markdown
        run: pnpm docs:lint

      - name: Check markdown reflow (one paragraph per line)
        run: pnpm docs:reflow:check

      - name: Check internal markdown links
        run: pnpm docs:links

      - name: Check generated reference docs are in sync
        run: pnpm docs:check

      - name: Check bundled packs are canonically formatted
        run: pnpm format:packs:check

      - name: Check server.json is in sync with the registry
        run: pnpm server-json:check

  test:
    # Test runs on the OS × Node-version matrix because Memento ships
    # via npx on macOS, Linux, and Windows. better-sqlite3 is a native
    # module, so OS coverage matters more here than in most JS projects.
    name: Test (${{ matrix.os }} / Node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["22", "24"]
    runs-on: ${{ matrix.os }}
    # 25 minutes covers the slowest cell with headroom (Windows test
    # currently ~140 s plus install). A hung step would otherwise burn
    # the default 6-hour budget.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Cache workspace node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          # Per-(OS, Node) cache. Native modules (better-sqlite3) are
          # ABI-tied to the Node version, so a Node 22 cache cannot be
          # restored into a Node 24 job. Lockfile-hash keys the rest.
          key: nm-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Ensure better-sqlite3 native binary
        # better-sqlite3's pnpm install lifecycle reports "Done"
        # but its prebuild-install silently no-ops in CI's pnpm 10
        # environment, leaving the .node binary absent. Force the
        # prebuild fetch directly inside the resolved package dir.
        # Safe to run unconditionally — fast no-op when the binary is
        # already present from a cached node_modules restore.
        shell: bash
        run: |
          set -euo pipefail
          PKG_DIR=$(find node_modules/.pnpm -maxdepth 3 -type d -path '*/better-sqlite3@*/node_modules/better-sqlite3' | head -n1)
          if [ -z "$PKG_DIR" ]; then
            echo "could not locate better-sqlite3 package" >&2
            exit 1
          fi
          echo "better-sqlite3 dir: $PKG_DIR"
          if [ ! -f "$PKG_DIR/build/Release/better_sqlite3.node" ]; then
            (cd "$PKG_DIR" && npx --yes prebuild-install --runtime=node)
          fi
          ls -1 "$PKG_DIR/build/Release/"

      - name: Build packages
        # Tests import the published package names (e.g.
        # `@psraghuveer/memento-core`) which resolve via the
        # workspace symlink to `packages/core`. Its `exports`
        # entry points at `./dist/index.js`, so dist/ must exist
        # before either `pnpm test` or the e2e runner.
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Run end-to-end tests
        # `pnpm test:e2e` does a redundant rebuild of a subset of
        # packages (we already ran `pnpm build` above). The
        # `test:e2e:run` script skips the rebuild and runs vitest
        # directly. Saves ~5–15 s per matrix cell.
        run: pnpm test:e2e:run
