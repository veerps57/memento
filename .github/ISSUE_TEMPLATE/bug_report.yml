name: Bug report
description: Something works incorrectly. Use this for reproducible defects, not questions.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please answer every section — vague reports cost much more time than detailed ones.

        For security-sensitive issues, **do not file here**. Use [GitHub Security Advisories](https://github.com/veerps57/memento/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: Memento version
      description: Output of `memento --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 (arm64)"
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: memento doctor output
      description: Run `memento doctor` and paste the full output here. Redact anything sensitive.
      render: shell
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Start from `npx memento init` if helpful.
      placeholder: |
        1. `npx memento init`
        2. `…`
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages verbatim.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Output of `memento config show` with secrets redacted. Optional but usually helpful.
      render: yaml

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I have read [KNOWN_LIMITATIONS.md](../KNOWN_LIMITATIONS.md) and the behavior is not a known v1 limitation.
          required: true
