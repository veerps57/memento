    <script>
      // Apply the saved theme before React mounts so we never
      // flash the default theme. Mirror dashboard convention:
      // dark by default, opt into light via `.light` on <html>.
      (function () {
        try {
          var saved = localStorage.getItem('memento-theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var resolved = saved ?? (prefersLight ? 'light' : 'dark');
          document.documentElement.classList.toggle('light', resolved === 'light');
        } catch (_) {
          /* localStorage unavailable — accept default dark. */
        }
      })();
    </script>

        <h1 style="font-size: 2rem; margin: 0 0 1rem;">Memento — one memory layer for every AI assistant you use.</h1>
        <p>A local-first, LLM-agnostic memory layer for AI assistants. Memento runs an MCP server over a single SQLite file on your machine, so any MCP-capable AI assistant — Claude Desktop, Claude Code, Cursor, GitHub Copilot, Cline, OpenCode, Aider, custom agents — can read and write durable, structured memory about you, your work, and your decisions.</p>
