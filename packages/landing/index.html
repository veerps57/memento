    <!-- Icons. We ship real files (favicon.ico, favicon.svg,
         favicon-{16,32}x{16,32}.png, apple-touch-icon.png) instead of
         relying on a single inline data: URI: every browser,
         preview unfurler, and AI crawler auto-probes /favicon.ico
         and /apple-touch-icon.png on first contact regardless of
         what's declared here. Missing these paths was the dominant
         source of Cloudflare 4xx noise. The .svg is the canonical
         source — see public/favicon.svg + scripts/generate-icons.mjs. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- iOS / Android "add to home screen" hints. Aligns the
         installed-PWA chrome with the same brand wording the rest
         of the page uses (title, og:site_name, schema.org name).
         `apple-mobile-web-app-status-bar-style: black-translucent`
         matches the dark theme-color in the head; the standalone
         install renders the body underneath instead of behind a
         coloured bar. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Memento" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Memento" />
    <!-- Bing/Edge live-tile probe defaults to /browserconfig.xml,
         which is also a 404 source today. Pointing it at our PNG
         skips the file and resolves the probe with one redirect. -->
    <meta name="msapplication-TileColor" content="#0E0E10" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="msapplication-config" content="none" />
    <script>
      // Apply the saved theme before React mounts so we never
      // flash the default theme. Mirror dashboard convention:
      // dark by default, opt into light via `.light` on <html>.
      (function () {
        try {
          var saved = localStorage.getItem('memento-theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var resolved = saved ?? (prefersLight ? 'light' : 'dark');
          document.documentElement.classList.toggle('light', resolved === 'light');
        } catch (_) {
          /* localStorage unavailable — accept default dark. */
        }
      })();
    </script>
