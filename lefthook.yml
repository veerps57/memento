# Lefthook git hooks for Memento.
#
# Two pre-commit checks against staged files only, both run in
# parallel for speed:
#
#   1. Biome — formatting + linting. Auto-fixed files are re-staged
#      so the commit reflects the formatter's output.
#   2. Typecheck — `tsc -b` runs on the whole project graph, not
#      just staged files, because TypeScript errors can be triggered
#      by changes elsewhere in the dependency graph.
#
# Pre-push runs the full test suite to keep broken tests off main.
# Local-only contributors can bypass with `--no-verify` if needed,
# but CI is the authoritative gate.
pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{ts,tsx,js,jsx,json,jsonc}'
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{ts,tsx}'
      run: pnpm exec tsc -b
    format-packs:
      # Re-runs the canonical YAML formatter when any pack manifest
      # lands in a commit. The formatter operates on the whole
      # `packs/` tree (not on `{staged_files}` individually) because
      # key-order canonicalisation is per-file and doesn't benefit
      # from staging context — and contributors expect a single
      # canonical artefact, not partial fixes.
      glob: 'packs/**/*.yaml'
      run: pnpm format:packs
      stage_fixed: true

pre-push:
  commands:
    branch-name:
      # Enforce branch naming convention. Allowed:
      #   - main
      #   - <type>/<slug> where type is one of:
      #     feat, fix, chore, docs, refactor, test, perf, ci, build, revert, hotfix
      #   - slug must start with [a-z0-9] and may contain [a-z0-9._-]
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if ! printf '%s' "$branch" | grep -Eq '^(main|(feat|fix|chore|docs|refactor|test|perf|ci|build|revert|hotfix)/[a-z0-9][a-z0-9._-]*)$'; then
          echo "✖ Branch name '$branch' does not match required pattern."
          echo "  Use: <type>/<slug>  where type ∈ feat|fix|chore|docs|refactor|test|perf|ci|build|revert|hotfix"
          echo "  slug: lowercase alphanumerics plus . _ -  (must start with [a-z0-9])"
          exit 1
        fi
    test:
      run: pnpm test
